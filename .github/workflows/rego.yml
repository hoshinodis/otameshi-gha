name: lint adr

on:
  issues:
    types:
      - edited

permissions:
  contents: write

jobs:
  archive-issue:
    if: contains(github.event.issue.labels.*.name, 'adr')
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Create issue markdown file
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          mkdir -p docs/adr

          slug="$(printf '%s' "$ISSUE_TITLE" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//')"

          if [ -z "$slug" ]; then
            slug="issue-$ISSUE_NUMBER"
          fi

          file_path="docs/adr/${slug}.md"

          cat > "$file_path" <<EOF
          # $ISSUE_TITLE

          - Issue Number: #$ISSUE_NUMBER

          ## Body

          ${ISSUE_BODY:-No description provided.}
          EOF

      - name: npm setup
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install conftest
        run: |
          curl -fsSL https://github.com/open-policy-agent/conftest/releases/download/v0.65.0/conftest_0.65.0_Linux_x86_64.tar.gz \
          | tar xz -C /usr/local/bin conftest
      - name: Install remark-cli
        run: npm install --global remark-cli
      - name: Verify Rego tests
        run: |
          conftest verify --policy policy/adr
      - name: Lint docs
        run: bash _scripts/rego.sh
